                sleep $((attempt * 2))
              fi
            done
            return 1
          }

          if stage_retry "Generate Daily Report" python - <<'PY'
          import json
          from pathlib import Path

          from job_model.validator import JobValidator
          from notifications.report_generator import ReportGenerator

          source = Path("cache/deduplicated_jobs.json")
          if not source.exists():
              raise SystemExit("cache/deduplicated_jobs.json is missing")

          raw_jobs = json.loads(source.read_text(encoding="utf-8"))
          validator = JobValidator()
          jobs = [validator.normalize(item) for item in raw_jobs]

          generator = ReportGenerator()
          html = generator.generate_html_report(jobs)
          csv_bytes = generator.generate_csv_report(jobs)
          json_bytes = generator.generate_json_report(jobs)
          pdf_bytes = generator.generate_pdf_report(jobs)

          reports_dir = Path("reports")
          reports_dir.mkdir(parents=True, exist_ok=True)

          (reports_dir / "daily_report.html").write_text(html, encoding="utf-8")
          (reports_dir / "daily_report.csv").write_bytes(csv_bytes)
          (reports_dir / "daily_report.json").write_bytes(json_bytes)
          (reports_dir / "daily_report.pdf").write_bytes(pdf_bytes)
          print(f"Wrote daily report assets to {reports_dir}")
          PY
          then
            echo "DAILY_REPORT_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "DAILY_REPORT_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi


name: AI Career Operating System

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      force_fresh:
        description: Rebuild the runtime state from scratch
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ai-career-operating-system
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  production-run:
    name: Autonomous production run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      MAX_RETRIES: "3"
      BACKUP_RETENTION_DAYS: "7"
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GOOGLE_CREDENTIALS: credentials/google_credentials.json
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SCRAPER_MAX_WORKERS: "16"
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Build Next.js Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy Frontend Assets to FastAPI Static Directory
        run: |
          rm -rf dashboard_backend/static
          mkdir -p dashboard_backend/static
          cp -r frontend/out/* dashboard_backend/static/

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install requirements
        run: |
          install_with_retry() {
            local attempt=1
            local max_attempts=3
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Installing dependencies (attempt $attempt/$max_attempts)"
              python -m pip install --upgrade pip setuptools wheel && \
                python -m pip install --no-input --disable-pip-version-check -r requirements.txt && \
                return 0
              echo "Dependency install failed on attempt $attempt"
              attempt=$((attempt + 1))
              if [ "$attempt" -le "$max_attempts" ]; then
                sleep $((attempt * 2))
              fi
            done
            return 1
          }

          install_with_retry

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Validate secrets
        run: |
          python - <<'PY'
          import os
          import sys

          required = {
              "GOOGLE_SHEET_ID": os.getenv("GOOGLE_SHEET_ID", "").strip(),
              "GOOGLE_CREDENTIALS_JSON": os.getenv("GOOGLE_CREDENTIALS_JSON", "").strip(),
              "EMAIL_ADDRESS": os.getenv("EMAIL_ADDRESS", "").strip(),
              "EMAIL_PASSWORD": os.getenv("EMAIL_PASSWORD", "").strip(),
          }

          missing = [name for name, value in required.items() if not value]
          if missing:
              print("Missing required secrets:", ", ".join(missing))
              sys.exit(1)

          print("Required secrets are present.")
          print("Notion secrets will be used only if a Notion updater script exists.")
          PY

      - name: Load environment variables
        run: |
          mkdir -p cache logs backups reports resume credentials

          python - <<'PY'
          import os
          from pathlib import Path

          credentials_path = Path("credentials/google_credentials.json")
          credentials_path.write_text(os.environ["GOOGLE_CREDENTIALS_JSON"], encoding="utf-8")
          print(f"Wrote credentials to {credentials_path}")
          PY

          if [ -f "resume/latest_resume.pdf" ]; then
            touch "resume/latest_resume.pdf"
          else
            newest_resume=$(find resume -maxdepth 1 -type f \( -iname "*.pdf" -o -iname "*.docx" -o -iname "*.txt" \) -printf '%T@ %p\n' | sort -nr | head -1 | cut -d' ' -f2-)
            if [ -z "$newest_resume" ]; then
              echo "::error::No resume file found in resume/. Add resume/latest_resume.pdf before running the workflow."
              exit 1
            fi
            cp "$newest_resume" "resume/latest_resume.pdf"
            touch "resume/latest_resume.pdf"
          fi

          echo "PIPELINE_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "GOOGLE_CREDENTIALS=credentials/google_credentials.json" >> "$GITHUB_ENV"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_fresh || 'false' }}" = "true" ]; then
            rm -f cache/checkpoint.json cache/discovered_jobs.json cache/normalized_jobs.json cache/filtered_jobs.json cache/rejected_jobs.json cache/matched_jobs.json cache/deduplicated_jobs.json cache/duplicate_references.json cache/verified_jobs.json cache/link_validation_summary.json cache/health_report.json
          fi

      - name: Run Resume Analyzer
        continue-on-error: true
        run: |
          stage_retry() {
            local stage_name="$1"
            shift
            local attempt=1
            local max_attempts=3
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "::group::$stage_name (attempt $attempt/$max_attempts)"
              "$@"
              status=$?
              echo "::endgroup::"
              if [ "$status" -eq 0 ]; then
                return 0
              fi
              echo "::warning::$stage_name failed with exit code $status"
              attempt=$((attempt + 1))
              if [ "$attempt" -le "$max_attempts" ]; then
                sleep $((attempt * 2))
              fi
            done
            return 1
          }

          if stage_retry "Run Resume Analyzer" python scripts/build_profile.py --force; then
            echo "RESUME_ANALYZER_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "RESUME_ANALYZER_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Run Job Search Engine

      - name: Summarize execution
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load_json(path: Path, default):
              if not path.exists():
                  return default
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return default

          cache = Path("cache")
          discovered = load_json(cache / "discovered_jobs.json", [])
          verified = load_json(cache / "verified_jobs.json", load_json(cache / "deduplicated_jobs.json", []))
          matched = load_json(cache / "matched_jobs.json", [])
          link_summary = load_json(cache / "link_validation_summary.json", {})
          resume_summary = load_json(cache / "resume_reports" / "career_summary.json", {})

          def extract_company(job):
              company = job.get("company", {}) if isinstance(job.get("company"), dict) else {}
              return company.get("company_name", "Unknown")

          def extract_match(job):
              resume_match = job.get("resume_match", {}) if isinstance(job.get("resume_match"), dict) else {}
              value = resume_match.get("candidate_match_score")
              try:
                  return float(value or 0.0)
              except Exception:
                  return 0.0

          def average(values):
              return round(sum(values) / len(values), 2) if values else 0.0

          execution_seconds = 0
          start_epoch = os.getenv("PIPELINE_START_EPOCH", "0")
          try:
              execution_seconds = max(0, int(__import__("time").time() - int(start_epoch))) if start_epoch else 0
          except Exception:
              execution_seconds = 0

          summary_lines = [
              "### AI Career Operating System - Execution Summary",
              "",
              "| Field | Value |",
              "|---|---:|",
              f"| Jobs Scanned | {len(discovered)} |",
              f"| Verified Jobs | {len(verified)} |",
              f"| Average Resume Match | {average([extract_match(job) for job in matched])} |",
              f"| Average ATS | {resume_summary.get('average_ats_score', 0)} |",
              f"| Duplicates | {max(0, len(matched) - len(verified))} |",
              f"| Dead Links | {link_summary.get('dead_links', 0)} |",
              f"| Execution Time | {execution_seconds}s |",
              f"| Email Sent | {os.getenv('EMAIL_SENT', 'skipped')} |",
              f"| Google Updated | {os.getenv('GOOGLE_UPDATED', 'skipped')} |",
              f"| Notion Updated | {os.getenv('NOTION_UPDATED', 'skipped')} |",
              f"| Workflow Status | {'success' if os.getenv('RESUME_ANALYZER_STATUS') == 'success' else 'degraded'} |",
          ]

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          print("Execution summary written to step summary.")
          PY

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ github.run_number }}
          path: |
            logs/
            cache/health_report.json
            cache/link_validation_summary.json
            reports/
          retention-days: 14
          if-no-files-found: ignore

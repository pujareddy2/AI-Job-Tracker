              attempt=$((attempt + 1))
              if [ "$attempt" -le "$max_attempts" ]; then
                sleep $((attempt * 2))
              fi
            done
            return 1
          }

          if stage_retry "Run Official Link Validation" python - <<'PY'
          import json
          from pathlib import Path

          from scrapers.job_intelligence import URLHealthValidator

          path = Path("cache/deduplicated_jobs.json")
          if not path.exists():
              raise SystemExit("cache/deduplicated_jobs.json is missing")

          raw_jobs = json.loads(path.read_text(encoding="utf-8"))
          verified_jobs = []
          rejected_count = 0

          for item in raw_jobs:
              application = item.get("application", {}) if isinstance(item.get("application"), dict) else {}
              url = application.get("application_url") or item.get("application_url") or item.get("url") or ""
              if URLHealthValidator.is_valid_apply_url(url, check_live=True):
                  verified_jobs.append(item)
              else:
                  rejected_count += 1

          path.write_text(json.dumps(verified_jobs, indent=2), encoding="utf-8")
          (path.parent / "verified_jobs.json").write_text(json.dumps(verified_jobs, indent=2), encoding="utf-8")
          (path.parent / "link_validation_summary.json").write_text(
              json.dumps({"verified_jobs": len(verified_jobs), "dead_links": rejected_count}, indent=2),
              encoding="utf-8",
          )
          print(f"Verified {len(verified_jobs)} jobs; rejected {rejected_count} dead/broken links.")
          PY
          then
            echo "OFFICIAL_LINK_STATUS=success" >> "$GITHUB_ENV"
          else
            echo "OFFICIAL_LINK_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Update Google Sheets
